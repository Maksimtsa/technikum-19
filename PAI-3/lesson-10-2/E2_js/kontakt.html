<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <title>Komputerowe</title>
    <link rel="stylesheet" href="styl.css">
    <link rel="icon" type="image/png" href="logo.png">
</head>

<body>
    <section class="kontener">
        <header>
            <img src="animacje.gif" alt="Pogotowie komputerowe">
        </header>

        <nav>
            <a href="index.html">Strona główna</a>
            <a href="kontakt.html">Kontakt</a>
        </nav>

        <main>
                <div id="left">
                    
                </div>
                <div id="center">
                    <h2>Kontakt</h2>
                    <form>
                        <table>
                            <tr>
                                <td><label for="name">Imię:</label></td>
                                <td><input type="text" name="name" id="name"></td>
                            </tr>
                            <tr>
                                <td><label for="surname">Nazwisko:</label></td>
                                <td><input type="text" name="surname" id="surname"></td>
                            </tr>
                            <tr>
                                <td><label for="email">E-mail:</label></td>
                                <td><input type="email" name="email" id="email"></td>
                            </tr>
                            <tr>
                                <td>Zgłoszenie:</td>
                                <td><select id="application">
                                    <option>naprawa komputerów</option>
                                    <option>odzyskiwanie danych</option>
                                    <option>wirusy</option>
                                    <option>konfiguracja LAN</option>
                                </select></td>
                            </tr>
                            <tr>
                                <td></td>
                                <td><input type="checkbox" id="show">Wyślij kopię wiadomości</td>
                            </tr>
                            <tr>
                                <td></td>
                                <td><button type="reset">Czyść</button><button type="button" id="send">Wyślij</button></td>
                            </tr>
                        </table>
                        <hr>
                        <p id="result"></p>
                    </form>
                </div>
                <div id="right">
                    
                </div>
                <script src="main.js"></script>
            </main>
        <footer>
            <p>Autor: 0000000</p>
        </footer>
    </section>
</body>

</html>
